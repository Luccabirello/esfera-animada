<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
        }

        .esfera {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #555, #000);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: background 0.5s ease, transform 0.3s ease;
        }

        .esfera:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="esfera" id="minhaEsfera"></div>

    <script>
        const esfera = document.getElementById('minhaEsfera');

        esfera.addEventListener('mouseenter', () => {
            // Gera uma cor hexadecimal aleatória
            const corAleatoria = '#' + Math.floor(Math.random()*16777215).toString(16);
            
            // Aplica a cor mantendo o efeito de profundidade (gradiente)
            esfera.style.background = `radial-gradient(circle at 30% 30%, ${corAleatoria}, #000)`;
        });
    </script>
</body>
</html>
